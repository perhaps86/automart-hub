<main class="wrap">
  <div class="eyebrow">STATS</div>
  <h1>통계 · 보정</h1>
  <p class="desc">누적 입찰결과로 시세 모델을 검증한다. 낙찰가÷기준가 중앙값이 1.0에 가까울수록 기준가가 정확.</p>
  <p class="meta" id="meta">-</p>
  <div class="banner" id="banner" style="display:none"></div>
  <div class="cards">
    <div class="card"><div class="k">누적 낙찰</div><div class="v" id="c-won">-</div></div>
    <div class="card"><div class="k">누적 유찰</div><div class="v" id="c-passed">-</div></div>
    <div class="card"><div class="k">낙찰가÷기준가 중앙값</div><div class="v" id="c-ratio">-</div></div>
    <div class="card"><div class="k">평균 입찰자수(낙찰)</div><div class="v" id="c-bidders">-</div></div>
  </div>
  <h2>월별 낙찰/유찰</h2>
  <div class="bars" id="m-bars"></div>
  <h2>예측할인 구간별 분포 <span style="font-weight:400;color:var(--mut);font-size:13px">(최저가 기준)</span></h2>
  <div class="chip-row" style="margin:6px 0 10px"><span class="lbl">연식</span>
    <span id="yg-chips" style="display:inline-flex;gap:6px;flex-wrap:wrap"></span>
    <span id="yg-info" style="color:var(--mut);font-size:13px;margin-left:8px"></span>
  </div>
  <div class="bars" id="b-bars"></div>
  <p class="legend"><i style="background:#2563eb"></i>낙찰 <i style="background:#cbd5e1"></i>유찰</p>
</main>
