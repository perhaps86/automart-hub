  <h1>진행중 매물</h1>
  <p class="desc">automart 공매 매물을 엔카 <b>기준가(트림/p25)</b><button class="help" type="button" aria-label="기준가 설명">?<span class="tip"><b>기준가</b> = 이 차의 현실적인 가치.<br>엔카에서 같은 모델·연식·비슷한 주행거리 매물 가격을 모아, <b>트림까지 일치하는 표본이 5건 이상이면 그 중앙값(트림)</b>, 아니면 <b>싼 쪽에서 1/4 지점 가격(p25)</b>을 씁니다. 딜러 호가 중앙값은 실거래보다 높아 보수적으로 잡은 값입니다.</span></button>와 비교해 실구매 할인율 순으로 정렬.
     <b>보수가</b>는 총비용이 엔카 p10 실구매가(가장 싼 retail)에 맞춰지는 입찰가, <b>하드캡</b><button class="help" type="button" aria-label="하드캡 설명">?<span class="tip"><b>하드캡</b> = 이 금액을 넘으면 엔카에서 사는 것보다 비싸지는 진짜 상한.<br>총비용(낙찰가+세금·수수료·정비)이 <b>엔카 실구매가(차값+취득세 등 엔카로 사도 드는 공통비용)</b>와 같아지는 입찰가입니다. 그 아래로는 공매가 더 쌉니다.</span></button>은 총비용=엔카 실구매가 역산값.</p>
